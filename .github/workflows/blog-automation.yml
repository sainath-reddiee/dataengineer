name: Blog Automation (Manual + Auto)

on:
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Generation Mode'
        required: true
        type: choice
        options:
          - 'automatic'
          - 'manual'
        default: 'automatic'
      
      num_posts:
        description: 'Number of posts'
        required: false
        default: '1'
      
      category:
        description: 'Category (automatic mode)'
        required: false
        type: choice
        options:
          - 'snowflake'
          - 'aws'
          - 'azure'
          - 'dbt'
          - 'airflow'
          - 'python'
          - 'sql'
          - 'gcp'
          - 'databricks'
          - 'salesforce'
          - 'data-engineering'
          - 'open-source'
          - 'career'
        default: 'snowflake'
      
      topic1:
        description: 'Topic 1 (manual mode) - Use quotes for multi-word topics'
        required: false
        default: ''
      
      status:
        description: 'Post status'
        required: true
        type: choice
        options:
          - 'draft'
          - 'publish'
        default: 'draft'
      
      enable_images:
        description: 'Generate images?'
        required: false
        type: boolean
        default: false
      
      model:
        description: 'Gemini model (e.g. gemini-2.0-flash, gemini-2.5-pro)'
        required: false
        default: 'gemini-2.0-flash'
      
      use_legacy:
        description: 'Use legacy V1 generator?'
        required: false
        type: boolean
        default: false

jobs:
  generate-blog-posts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('blog-automation/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r blog-automation/requirements.txt
      
      - name: Generate blog posts (Automatic Mode)
        if: github.event.inputs.mode == 'automatic'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USER: ${{ secrets.WORDPRESS_USER }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          USE_IMAGES: ${{ github.event.inputs.enable_images || 'false' }}
          GEMINI_MODEL: ${{ github.event.inputs.model || 'gemini-2.0-flash' }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "🤖 AUTOMATIC mode - Will create ${{ github.event.inputs.num_posts || '1' }} post(s)"
          LEGACY_FLAG=""
          if [ "${{ github.event.inputs.use_legacy }}" = "true" ]; then
            LEGACY_FLAG="--legacy"
          fi
          python blog-automation/main_gemini.py \
            --posts ${{ github.event.inputs.num_posts || '1' }} \
            --category ${{ github.event.inputs.category || 'snowflake' }} \
            --status ${{ github.event.inputs.status || 'draft' }} \
            $LEGACY_FLAG
      
      - name: Generate blog posts (Manual Mode)
        if: github.event.inputs.mode == 'manual'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USER: ${{ secrets.WORDPRESS_USER }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          USE_IMAGES: ${{ github.event.inputs.enable_images || 'false' }}
          GEMINI_MODEL: ${{ github.event.inputs.model || 'gemini-2.0-flash' }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TOPIC1: ${{ github.event.inputs.topic1 }}
        run: |
          echo "✍️  MANUAL mode"
          echo "Topic: $TOPIC1"
          
          if [ -z "$TOPIC1" ]; then
            echo "❌ No topic provided!"
            exit 1
          fi
          
          LEGACY_FLAG=""
          if [ "${{ github.event.inputs.use_legacy }}" = "true" ]; then
            LEGACY_FLAG="--legacy"
          fi
          
          # Use environment variable to avoid shell word splitting
          python blog-automation/main_gemini.py \
            --topics "$TOPIC1" \
            --status ${{ github.event.inputs.status || 'draft' }} \
            $LEGACY_FLAG
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blog-outputs-${{ github.run_number }}
          path: blog_outputs/
          retention-days: 30
