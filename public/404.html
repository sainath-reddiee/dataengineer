<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | DataEngineer Hub</title>
    <meta name="description" content="The page you are looking for does not exist. Browse our data engineering articles, glossary, and tool comparisons." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://dataengineerhub.blog" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #312e81 100%);
        color: #f8fafc;
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .error-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 20px;
        text-align: center;
      }
      .error-code {
        font-size: 6rem;
        font-weight: 800;
        background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #f472b6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.5rem;
        color: #e2e8f0;
        margin-bottom: 1rem;
      }
      p {
        color: #94a3b8;
        font-size: 1.1rem;
        margin-bottom: 2rem;
        line-height: 1.7;
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
      }
      .links a {
        display: inline-block;
        padding: 12px 24px;
        background: rgba(255, 255, 255, 0.08);
        color: #93c5fd;
        text-decoration: none;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-weight: 500;
        transition: background 0.2s, border-color 0.2s;
      }
      .links a:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(96, 165, 250, 0.4);
      }
      .links a.primary {
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        color: white;
        border: none;
      }
      .links a.primary:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>
        The page you are looking for does not exist or has been moved.
        Try browsing our articles, glossary, or tool comparisons instead.
      </p>
      <div class="links">
        <a href="/" class="primary">Go to Homepage</a>
        <a href="/articles">All Articles</a>
        <a href="/glossary">Glossary</a>
        <a href="/compare">Comparisons</a>
      </div>
    </div>
  </body>
</html>
